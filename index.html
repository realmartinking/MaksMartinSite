<style>

    line-height:1;
    opacity:0;
    animation:prl-counter-in 600ms cubic-bezier(0.22,1,0.36,1) 200ms forwards;
  }
  @keyframes prl-counter-in { to { opacity:1; } }
  @media (max-width:768px) {
    .prl-counter { left:calc(100% + 12px); }
  }

  /* ── Reveal ── */
  body.loading .stage,
  body.loading .chrome { opacity:0; }

  body.reveal .stage          { opacity:1; }
  body.reveal .lockup         { opacity:1; filter:blur(0); }
  body.reveal .tile           { opacity:1; transform:translateY(0); }
  body.reveal .chrome         { opacity:1; }
  body.reveal .lockup-tagline { opacity:1; }

  body.reveal-done .lockup,
  body.reveal-done .tile,

</style>

<script>
/* ========================================================
   PROJECTS
======================================================== */
const PROJECTS = [
  { file:'aurica.mp4',       name:'Aurica',                       type:'video' },
  { file:'aurix.mp4',        name:'AURIX',                        type:'video' },
  { file:'forma.mp4',        name:'Forma Houseboat',              type:'video' },
  { file:'vishnevetsky.png', name:"General Vishnevetsky's Dacha", type:'image' },
  { file:'hightbay.mp4',     name:'HightBay',                     type:'video' },
  { file:'humber.png',       name:'Humber',                       type:'image' },
  { file:'lumio.png',        name:'Lumio',                        type:'image' },
  { file:'maoundi.mp4',      name:'Maoundi',                      type:'video' },
  { file:'muse.png',         name:'Muse',                         type:'image' },
  { file:'raif.mp4',         name:'Raif Vision Conference',       type:'video' },
  { file:'russia-expo.mp4',  name:'Russia Expo 25',               type:'video' },
  { file:'saga.mp4',         name:'Saga',                         type:'video' },
  { file:'semya.mp4',        name:'Supermarket Semya',            type:'video' },
  { file:'value.mp4',        name:'Value',                        type:'video' },
  { file:'manery.mp4',       name:'Манеры',                       type:'video' },
  { file:'nasledie.mp4',     name:'Наследие',                     type:'video' },
  { file:'serdtse.mp4',      name:'Умное Сердце',                 type:'video' },
].map(p => ({ ...p, src:'assets/projects/'+p.file }));

/* ========================================================
   DETECT DIMENSIONS
======================================================== */
function detectDims(p) {
  return new Promise(resolve => {
    if (p.type === 'video') {
      const v = document.createElement('video');
      v.preload = 'metadata'; v.muted = true; v.src = p.src;
      v.onloadedmetadata = () => resolve({ w: v.videoWidth||16, h: v.videoHeight||9 });
      v.onerror = () => resolve({ w:16, h:9 });
    } else {
      const img = new Image();
      img.src = p.src;
      img.onload  = () => resolve({ w: img.naturalWidth||1, h: img.naturalHeight||1 });
      img.onerror = () => resolve({ w:1, h:1 });
    }
  });
}

function dimsToTile(w, h) {
  const aspect = w / h;
  const TARGET_H = 340, MAX_W = 580, MIN_W = 240, MAX_H = 500, MIN_H = 180;
  let tw = TARGET_H * aspect, th = TARGET_H;
  if (tw > MAX_W) { tw = MAX_W; th = MAX_W / aspect; }
  if (tw < MIN_W) { tw = MIN_W; th = MIN_W / aspect; }
  if (th > MAX_H) { th = MAX_H; tw = MAX_H * aspect; }
  if (th < MIN_H) { th = MIN_H; tw = MIN_H * aspect; }
  return [Math.round(tw), Math.round(th)];
}

/* ========================================================
   CANVAS ENGINE — constants & helpers
======================================================== */
const DESIGN_W_DESKTOP = 1440, DESIGN_W_MOBILE = 600;
function getDesignW() { return window.innerWidth <= 768 ? DESIGN_W_MOBILE : DESIGN_W_DESKTOP; }
function getU() { return window.innerWidth / getDesignW(); }

const stage = document.getElementById('stage');
const world = document.getElementById('world');

let BLOCK_W = 3600, BLOCK_H = 2700;
const LOCKUP_W = 1300, LOCKUP_H = 450;
const EX_PAD = 120, MIN_GAP = 100, SEARCH_R = 1500, BLOCK_MIN = 1.8;
let BLOCK_PAD = parseInt(localStorage.getItem('blockPad') ?? '120');
let captionGap = 14;         // design px between tile bottom and caption top
let captionDefaultSize = 14; // design px
// True after world is positioned (2 rAF after init builds blocks).
// setTileMedia uses data-src before this, src directly after.
let _initDone = false;

function mulberry32(seed) {
  return function() {
    let t = seed += 0x6D2B79F5;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
const rand = mulberry32(42);

function rectsOverlap(a, b, gap) {
  return !(a.x+a.w+gap < b.x || b.x+b.w+gap < a.x || a.y+a.h+gap < b.y || b.y+b.h+gap < a.y);
}
function rectInExclusionC(r) {
  const ex1 = -LOCKUP_W/2-EX_PAD, ex2 = LOCKUP_W/2+EX_PAD;
  const ey1 = -LOCKUP_H/2-EX_PAD, ey2 = LOCKUP_H/2+EX_PAD;
  return !(r.x+r.w < ex1 || r.x > ex2 || r.y+r.h < ey1 || r.y > ey2);
}

function generateLayoutCentered(tileSizes) {
  const order = tileSizes.map((_,i)=>i);
  for (let i = order.length-1; i > 0; i--) {
    const j = Math.floor(rand()*(i+1)); [order[i],order[j]]=[order[j],order[i]];
  }
  const placed = [];
  for (const pi of order) {
    const [w,h] = tileSizes[pi]; let ok = false;
    for (let a=0; a<700; a++) {
      const cx=(rand()-.5)*2*SEARCH_R, cy=(rand()-.5)*2*SEARCH_R*.75;
      const r={x:cx-w/2,y:cy-h/2,w,h,pi};
      if (rectInExclusionC(r)) continue;
      if (placed.some(p=>rectsOverlap(r,p,MIN_GAP))) continue;
      placed.push(r); ok=true; break;
    }
    if (!ok) {
      for (let a=0; a<300; a++) {
        const cx=(rand()-.5)*2*SEARCH_R, cy=(rand()-.5)*2*SEARCH_R*.75;
        const r={x:cx-w/2,y:cy-h/2,w,h,pi};
        if (!rectInExclusionC(r)) { placed.push(r); break; }
      }
    }
  }
  return placed;
}

function computeBlock(centered) {
  const u   = getU();
  const MIN_W = (window.innerWidth /u)*BLOCK_MIN;
  const MIN_H = (window.innerHeight/u)*BLOCK_MIN;
  if (!centered.length) return { w:Math.max(3600,MIN_W), h:Math.max(2700,MIN_H) };
  let x0=Infinity,y0=Infinity,x1=-Infinity,y1=-Infinity;
  for (const t of centered) { x0=Math.min(x0,t.x);y0=Math.min(y0,t.y);x1=Math.max(x1,t.x+t.w);y1=Math.max(y1,t.y+t.h); }
  return { w:Math.round(Math.max(x1-x0+2*BLOCK_PAD,MIN_W)), h:Math.round(Math.max(y1-y0+2*BLOCK_PAD,MIN_H)) };
}

function toAbsLayout(centered, bw, bh) {
  return centered.map(t=>({...t, x:Math.round(t.x+bw/2), y:Math.round(t.y+bh/2)}));
}

/* ========================================================
   TILE NAMES
======================================================== */
function defaultName(p) {
  return p.file.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
}
let tileNames = PROJECTS.map(defaultName);
function loadTileNames() {
  try {
    const saved = JSON.parse(localStorage.getItem('tileNames')||'null');
    if (Array.isArray(saved) && saved.length === PROJECTS.length)
      tileNames = saved;
  } catch(_) {}
}
function saveTileNames() { localStorage.setItem('tileNames', JSON.stringify(tileNames)); }
loadTileNames();

/* ── IndexedDB for uploaded media ── */
const IDB_NAME = 'maks-martin', IDB_STORE = 'media', IDB_VER = 1;
let _idb = null;
function openIDB() {
  if (_idb) return Promise.resolve(_idb);
  return new Promise((res, rej) => {
    const req = indexedDB.open(IDB_NAME, IDB_VER);
    req.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE);
    req.onsuccess = e => { _idb = e.target.result; res(_idb); };
    req.onerror   = e => rej(e);
  });
}
function idbPut(key, blob) {
  return openIDB().then(db => new Promise((res,rej)=>{
    const tx = db.transaction(IDB_STORE,'readwrite');
    tx.objectStore(IDB_STORE).put(blob, key);
    tx.oncomplete=res; tx.onerror=rej;
  }));
}
function idbGet(key) {
  return openIDB().then(db => new Promise((res,rej)=>{
    const req = db.transaction(IDB_STORE,'readonly').objectStore(IDB_STORE).get(key);
    req.onsuccess = e => res(e.target.result);
    req.onerror   = rej;
  }));
}
function idbDel(key) {
  return openIDB().then(db => new Promise((res,rej)=>{
    const tx = db.transaction(IDB_STORE,'readwrite');
    tx.objectStore(IDB_STORE).delete(key);
    tx.oncomplete=res; tx.onerror=rej;
  }));
}

/* ── Layout persistence ── */
function saveLayout() {
  // Save layout without blob URLs (store mediaKey instead)
  const serialized = layout.map(t => ({
    x: t.x, y: t.y, w: t.w, h: t.h, pi: t.pi,
    mediaKey:   t.mediaKey   || null,
    customType: t.customType || null,
  }));
  localStorage.setItem('layout', JSON.stringify(serialized));
  localStorage.setItem('layoutBlock', JSON.stringify({w: BLOCK_W, h: BLOCK_H}));
}
function loadLayoutRaw() {
  try {
    const s = JSON.parse(localStorage.getItem('layout')||'null');
    const b = JSON.parse(localStorage.getItem('layoutBlock')||'null');
    if (Array.isArray(s) && s.length && b) return { tiles: s, block: b };
  } catch(_) {}
  return null;
}

/* tileCaptionSizes: array of number|null (null = use captionDefaultSize) */
let tileCaptionSizes = PROJECTS.map(()=>null);
function loadCaptionSizes() {
  try {
    const s = JSON.parse(localStorage.getItem('captionSizes')||'null');
    const d = parseFloat(localStorage.getItem('captionDefaultSize'));
    if (Array.isArray(s) && s.length===PROJECTS.length) tileCaptionSizes=s;
    if (!isNaN(d)) captionDefaultSize=d;
  } catch(_){}
}
function saveCaptionSizes() {
  localStorage.setItem('captionSizes', JSON.stringify(tileCaptionSizes));
  localStorage.setItem('captionDefaultSize', captionDefaultSize);
  localStorage.setItem('captionGap', captionGap);
}
function getCaptionSize(idx) { return tileCaptionSizes[idx] ?? captionDefaultSize; }
loadCaptionSizes();

/* tileLinks: URL per tile (null = no link) */
let tileLinks = PROJECTS.map(()=>null);
function loadTileLinks() {
  try {
    const s=JSON.parse(localStorage.getItem('tileLinks')||'null');
    if (Array.isArray(s)) tileLinks=s;
    const g=parseFloat(localStorage.getItem('captionGap'));
    if (!isNaN(g)) captionGap=g;
  } catch(_){}
}
function saveTileLinks() { localStorage.setItem('tileLinks', JSON.stringify(tileLinks)); }
loadTileLinks();

/* ========================================================
   LAYOUT STATE & TILE ELEMENTS
======================================================== */
let layout     = [];   // { x,y,w,h,pi } absolute in block
let tileEls    = [];   // tileEls[blockIdx][tileIdx] = DOM element
let captionEls = [];   // captionEls[blockIdx][tileIdx] = DOM element

function worldToScreen(wx, wy) {
  const u=getU(), vw=window.innerWidth, vh=window.innerHeight;
  const tx=(-camX-parallaxX)*u+vw/2, ty=(-camY-parallaxY)*u+vh/2;
  const baseBX=Math.round(camX/BLOCK_W)*BLOCK_W, baseBY=Math.round(camY/BLOCK_H)*BLOCK_H;
  return { x: tx+(baseBX-BLOCK_W/2+wx)*u, y: ty+(baseBY-BLOCK_H/2+wy)*u };
}
function screenToWorld(sx, sy) {
  const u=getU(), vw=window.innerWidth, vh=window.innerHeight;
  const tx=(-camX-parallaxX)*u+vw/2, ty=(-camY-parallaxY)*u+vh/2;
  const baseBX=Math.round(camX/BLOCK_W)*BLOCK_W, baseBY=Math.round(camY/BLOCK_H)*BLOCK_H;
  return { x:(sx-tx)/u-(baseBX-BLOCK_W/2), y:(sy-ty)/u-(baseBY-BLOCK_H/2) };
}

function updateTileDom(idx) {
  const t = layout[idx];
  for (const blockTiles of tileEls) {
    const el = blockTiles[idx];
    if (!el) continue;
    el.style.left   = t.x+'px';
    el.style.top    = t.y+'px';
    el.style.width  = t.w+'px';
    el.style.height = t.h+'px';
  }
  for (const blockCaps of captionEls) {
    const cap = blockCaps[idx];
    if (!cap) continue;
    cap.style.left = t.x+'px';
    cap.style.top  = (t.y + t.h + captionGap)+'px';
  }
}

function updateAllCaptionGaps() {
  for (let i=0; i<layout.length; i++) {
    const t=layout[i];
    for (const blockCaps of captionEls) {
      const cap=blockCaps[i];
      if (cap) cap.style.top=(t.y+t.h+captionGap)+'px';
    }
  }
}

function updateCaptionSize(idx) {
  const sz = getCaptionSize(idx);
  for (const blockCaps of captionEls) {
    const cap = blockCaps[idx];
    if (cap) cap.style.fontSize = sz+'px';
  }
}

function recalcBlock() {
  const centered = layout.map(t=>({...t, x:t.x-BLOCK_W/2, y:t.y-BLOCK_H/2}));
  const {w:newBW, h:newBH} = computeBlock(centered);
  if (newBW !== BLOCK_W || newBH !== BLOCK_H) {
    const dx=(newBW-BLOCK_W)/2, dy=(newBH-BLOCK_H)/2;
    BLOCK_W=newBW; BLOCK_H=newBH;
    for (const t of layout) { t.x+=dx; t.y+=dy; }
    for (const b of BLOCKS) {
      b.style.width=BLOCK_W+'px'; b.style.height=BLOCK_H+'px';
      const lk=b.querySelector('.lockup');
      if (lk) { lk.style.left='50%'; lk.style.top='50%'; lk.style.transform='translate(-50%,-50%)'; }
    }
    for (let i=0; i<layout.length; i++) updateTileDom(i);
  }
  const el=document.getElementById('dbg-block-val');
  if (el) el.textContent=`${BLOCK_W} × ${BLOCK_H}`;
  saveLayout();
}

function updateSelectionVisuals() {

/* tile context toolbar */
const tileCtxEl = document.getElementById('tile-ctx');
function showTileCtx(idx) { lastSelIdx=idx; positionTileCtx(idx); tileCtxEl.classList.add('visible'); }
function hideTileCtx()    { tileCtxEl.classList.remove('visible'); }
function positionTileCtx(idx) {
  if (idx<0||idx>=layout.length||!tileCtxEl.classList.contains('visible')) return;
  const t=layout[idx];
  const sc=worldToScreen(t.x+t.w/2, t.y);
  const w=tileCtxEl.offsetWidth||110;
  tileCtxEl.style.left=Math.max(4,Math.min(sc.x-w/2, window.innerWidth-w-4))+'px';
  tileCtxEl.style.top =Math.max(4, sc.y-42)+'px';
}

function duplicateTile(idx) {
  if (idx<0||idx>=layout.length) return;
  const t=layout[idx];
  layout.push({...t, x:t.x+40, y:t.y+40});
  tileNames.push((tileNames[idx]||'')+'_2');
  tileCaptionSizes.push(tileCaptionSizes[idx]);
  tileLinks.push(tileLinks[idx]);
  saveTileNames(); saveCaptionSizes(); saveTileLinks(); saveLayout();
  rebuildAllBlocks(); recalcBlock();
  const ni=layout.length-1;
  selectedSet.clear(); selectedSet.add(ni); lastSelIdx=ni;
  updateSelectionVisuals(); showTileCtx(ni);
}

function moveTileZ(idx, dir) {
  const ni=idx+dir;
  if (ni<0||ni>=layout.length) return;
  [layout[idx],layout[ni]]=[layout[ni],layout[idx]];
  [tileNames[idx],tileNames[ni]]=[tileNames[ni],tileNames[idx]];
  [tileCaptionSizes[idx],tileCaptionSizes[ni]]=[tileCaptionSizes[ni],tileCaptionSizes[idx]];
  [tileLinks[idx],tileLinks[ni]]=[tileLinks[ni],tileLinks[idx]];
  saveTileNames(); saveCaptionSizes(); saveTileLinks(); saveLayout();
  rebuildAllBlocks();
  if (lastSelIdx===idx) lastSelIdx=ni;
  const hadIdx=selectedSet.has(idx), hadNi=selectedSet.has(ni);
  selectedSet.clear();
  if (hadIdx) selectedSet.add(ni); if (hadNi) selectedSet.add(idx);
  updateSelectionVisuals(); if (editMode) showTileCtx(lastSelIdx);
}

document.getElementById('tctx-dup').addEventListener('click',()=>{ if(lastSelIdx>=0) duplicateTile(lastSelIdx); });
document.getElementById('tctx-zup').addEventListener('click',()=>{ if(lastSelIdx>=0) moveTileZ(lastSelIdx,1); });
document.getElementById('tctx-zdn').addEventListener('click',()=>{ if(lastSelIdx>=0) moveTileZ(lastSelIdx,-1); });
tileCtxEl.addEventListener('pointerdown', e=>e.stopPropagation());

function snapVal(v, grid) { return grid > 0 ? Math.round(v/grid)*grid : v; }

function computeGuides(idx, x, y, w, h) {
  const refs = {
    x: [BLOCK_W/2, BLOCK_W/2-LOCKUP_W/2, BLOCK_W/2+LOCKUP_W/2],
    y: [BLOCK_H/2, BLOCK_H/2-LOCKUP_H/2, BLOCK_H/2+LOCKUP_H/2],
  };
  for (let i=0; i<layout.length; i++) {
    if (i===idx) continue;
    const t=layout[i];
    refs.x.push(t.x, t.x+t.w, t.x+t.w/2);
    refs.y.push(t.y, t.y+t.h, t.y+t.h/2);
  }
  let snapX=x, snapY=y;
  const lines=[];
  const myXs=[[x,0],[x+w,w],[x+w/2,w/2]];
  const myYs=[[y,0],[y+h,h],[y+h/2,h/2]];
  for (const [mx,off] of myXs) {
    for (const rx of refs.x) {
      if (Math.abs(mx-rx)<ALIGN_SNAP) { snapX=rx-off; lines.push({type:'v',pos:rx}); break; }
    }
  }
  for (const [my,off] of myYs) {
    for (const ry of refs.y) {
      if (Math.abs(my-ry)<ALIGN_SNAP) { snapY=ry-off; lines.push({type:'h',pos:ry}); break; }
    }
  }
  return { x:snapX, y:snapY, lines };
}

const captionCtx = document.getElementById('caption-ctx');

function showCaptionCtx(idx, capEl) {
  ctxActiveIdx = idx;
  ctxSizeVal.textContent = getCaptionSize(idx);
  captionCtx.classList.add('visible');
  // Position near caption in screen space
  const rect = capEl.getBoundingClientRect();

captionCtx.addEventListener('pointerleave', ()=>{ ctxPinned=false; hideCaptionCtx(); });

function changeCaptionSize(idx, delta) {
  const cur = getCaptionSize(idx);
  const nv  = Math.min(32, Math.max(8, Math.round((cur + delta) * 2) / 2));
  tileCaptionSizes[idx] = nv;
  saveCaptionSizes();
  updateCaptionSize(idx);
  ctxSizeVal.textContent = nv;
}

document.getElementById('ctx-minus').addEventListener('click', ()=>{
  if (ctxActiveIdx < 0) return; changeCaptionSize(ctxActiveIdx, -0.5);

document.getElementById('ctx-plus').addEventListener('click', ()=>{

});

function addEditHandles(el, idx) {
  if (el.querySelector('.tile-handle-resize')) return;
  el.classList.add('editable');

  // Resize handle
  const rh=document.createElement('div'); rh.className='tile-handle-resize';
  el.appendChild(rh);

  // Delete
  const dh=document.createElement('div'); dh.className='tile-handle-delete'; dh.textContent='×';
  el.appendChild(dh);
  dh.addEventListener('pointerdown', e=>{
    e.stopPropagation();
    if (layout[idx]?.mediaKey) idbDel(layout[idx].mediaKey);
    layout.splice(idx,1); tileNames.splice(idx,1); tileCaptionSizes.splice(idx,1); tileLinks.splice(idx,1);
    saveTileNames(); saveCaptionSizes(); saveTileLinks(); saveLayout();
    rebuildAllBlocks(); recalcBlock();
  });

  // Upload (replace media)
  const uh=document.createElement('div'); uh.className='tile-handle-upload'; uh.textContent='↑';
  uh.title='Заменить медиа';
  el.appendChild(uh);
  uh.addEventListener('pointerdown', e=>e.stopPropagation());
  uh.addEventListener('click', e=>{
    e.stopPropagation();
    const inp=document.createElement('input'); inp.type='file';
    inp.accept='image/*,video/*';
    inp.addEventListener('change', ()=>{
      const file=inp.files[0]; if (!file) return;
      const url=URL.createObjectURL(file);
      const type=file.type.startsWith('video')?'video':'image';
      // Save blob to IDB
      const mediaKey = 'tile-' + idx + '-' + Date.now();
      // Remove old IDB entry if any
      if (layout[idx].mediaKey) idbDel(layout[idx].mediaKey);
      idbPut(mediaKey, file).then(()=>{
        layout[idx].customSrc=url; layout[idx].customType=type; layout[idx].mediaKey=mediaKey;
        saveLayout();
        for (const blockTiles of tileEls) {
          const t=blockTiles[idx]; if (t) setTileMedia(t,url,type);
        }
      });
    });
    inp.click();
  });

  // Link
  const lh=document.createElement('div'); lh.className='tile-handle-link';
  lh.textContent = tileLinks[idx] ? '🔗' : '⊕';
  lh.title='Ссылка';
  el.appendChild(lh);
  lh.addEventListener('pointerdown', e=>e.stopPropagation());
  lh.addEventListener('click', e=>{
    e.stopPropagation();
    const cur=tileLinks[idx]||'';
    const rect=lh.getBoundingClientRect();
    showLinkPopup(rect, cur, val=>{
      tileLinks[idx]=val||null; saveTileLinks();
      lh.textContent=tileLinks[idx]?'🔗':'⊕';
    });
  });
}

function removeEditHandles(el) {
  el.classList.remove('editable','selected','multi-sel');
  el.querySelectorAll('[class*="tile-handle"]').forEach(h=>h.remove());
}

function setEditMode(on) {
  editMode = on;
  stage.classList.toggle('edit-active', on);
  const btn=document.getElementById('dbg-edit-btn');
  if (btn) btn.classList.toggle('on', on);
  for (const blockTiles of tileEls) {
    for (let i=0; i<blockTiles.length; i++) {
      if (on) addEditHandles(blockTiles[i], i);
      else    removeEditHandles(blockTiles[i]);
    }
  }
  // toggle caption pointer-events
  for (const blockCaps of captionEls) {
    for (const cap of blockCaps) {
      if (cap) cap.classList.toggle('edit-ready', on);
    }
  }
  if (!on) { guideLines=[]; activeTile=null; hideLinkPopup(); hideCaptionCtx(); clearSelection(); }
}

/* ========================================================
   BUILD BLOCK
======================================================== */
function setTileMedia(tile, src, type) {
  tile.querySelectorAll('video,img').forEach(el=>el.remove());
  if (type==='video') {
    const v=document.createElement('video');
    v.muted=true; v.loop=true;
    v.setAttribute('muted','');              // Safari requires attribute, not just property
    v.setAttribute('playsinline','');
    v.setAttribute('webkit-playsinline',''); // legacy iOS Safari
    if (_initDone) {
      // Post-init (edit/rebuild): world is positioned, load immediately
      v.preload='auto'; v.src=src;
    } else {
      // Initial load: defer src — tier1/tier2 split happens after world positions
      v.preload='none'; v.dataset.src=src;
    }
    tile.insertBefore(v, tile.firstChild);
  } else {
    const img=document.createElement('img');
    img.src=src; img.loading='lazy';
    tile.insertBefore(img, tile.firstChild);
  }
}

function makeTileEl(project, idx) {
  const tile=document.createElement('div'); tile.className='tile';
  // Use custom src if uploaded, else default
  const src  = layout[idx]?.customSrc  || project.src;
  const type = layout[idx]?.customType || project.type;
  setTileMedia(tile, src, type);

  // Click in view mode → follow link
  tile.addEventListener('click', e=>{
    if (editMode) return;
    const link = tileLinks[idx];
    if (link) { e.stopPropagation(); window.open(link,'_blank'); }
  });
  return tile;
}

function makeCaptionEl(idx, t) {
  const cap = document.createElement('div');
  cap.className = 'tile-caption';
  cap.dataset.tileIdx = idx;
  cap.textContent = tileNames[idx] || PROJECTS[t.pi].name;
  cap.style.left     = t.x+'px';
  cap.style.top      = (t.y + t.h + captionGap)+'px';
  cap.style.fontSize = getCaptionSize(idx)+'px';

  let editing = false;

  // Block pointerdown so stage doesn't grab it in edit mode
  cap.addEventListener('pointerdown', e=>{
    if (editMode) e.stopPropagation();
  });

  // Single click — just stop propagation so canvas doesn't move
  cap.addEventListener('click', e=>{ if (editMode) e.stopPropagation(); });

  // Double-click → floating input in screen space
  cap.addEventListener('dblclick', e=>{
    if (!editMode || editing) return;
    e.stopPropagation(); e.preventDefault();
    editing = true;

    const rect = cap.getBoundingClientRect();
    const fgColor = getComputedStyle(document.documentElement).getPropertyValue('color') ||
                    (document.documentElement.getAttribute('data-theme')==='dark' ? '#fff' : '#000');

    const inp = document.createElement('input');
    inp.type = 'text';
    inp.value = tileNames[idx] || PROJECTS[t.pi].name;
    Object.assign(inp.style, {
      position: 'fixed',
      left: rect.left + 'px',
      top:  (rect.top + 2) + 'px',
      minWidth: Math.max(rect.width + 20, 160) + 'px',
      fontSize: getCaptionSize(idx) * getU() + 'px',
      fontFamily: "'Gramatika',-apple-system,sans-serif",
      fontWeight: '700',
      letterSpacing: '-.01em',
      background: 'transparent',
      border: 'none',
      borderBottom: '1.5px solid rgba(255,80,80,.8)',
      outline: 'none',
      color: document.documentElement.getAttribute('data-theme')==='dark' ? '#fff' : '#000',
      padding: '0',
      margin: '0',
      zIndex: '3000',
      boxSizing: 'border-box',
    });
    document.body.appendChild(inp);

    // Hide the real caption text while editing
    cap.style.opacity = '0';

    requestAnimationFrame(()=>{ inp.focus(); inp.select(); });

    function commit() {
      const val = inp.value.trim() || PROJECTS[t.pi].name;
      tileNames[idx] = val;
      saveTileNames();
      for (const blockCaps of captionEls) {
        const c = blockCaps[idx]; if (c) c.textContent = val;
      }
      for (const blockCaps of captionEls) {
        const c = blockCaps[idx]; if (c) c.style.opacity = '';
      }
      inp.remove(); editing = false; hideCaptionCtx();
    }
    function cancel() {
      cap.style.opacity = '';
      inp.remove(); editing = false;
    }

    inp.addEventListener('keydown', e2=>{
      if (e2.key==='Enter')  { e2.preventDefault(); commit(); }
      if (e2.key==='Escape') { cancel(); }
    });
    inp.addEventListener('blur', ()=>{ if (editing) commit(); }, {once:true});
  });

  // Hover → A-/A+ context
  cap.addEventListener('pointerenter', ()=>{ if (editMode) showCaptionCtx(idx, cap); });
  cap.addEventListener('pointerleave', ()=>{ setTimeout(()=>{ if (!ctxPinned) hideCaptionCtx(); }, 200); });

  return cap;
}

function buildBlock(blockEl, bw, bh, blockIdx) {
  blockEl.style.width=bw+'px'; blockEl.style.height=bh+'px';
  const lk=document.createElement('div'); lk.className='lockup';
  // Center lockup by its actual content size, not by LOCKUP_W constant
  lk.style.left='50%'; lk.style.top='50%';
  lk.style.transform='translate(calc(-50% + var(--lockup-offset-x) * var(--u)), calc(-50% + var(--lockup-offset-y) * var(--u)))';
  lk.innerHTML=`
    <div class="lockup-row">
      <span class="lockup-word">Maks</span>
      <span class="lockup-emblem" aria-hidden="true"></span>
      <span class="lockup-word">Martin</span>
    </div>
    <div class="lockup-tagline">Timeless design,<br/>like classical music,<br/>love and money</div>`;
  blockEl.appendChild(lk);
  tileEls[blockIdx]    = [];
  captionEls[blockIdx] = [];
  for (let i=0; i<layout.length; i++) {
    const t=layout[i];
    const el=makeTileEl(PROJECTS[t.pi], i);
    el.dataset.tileIdx=i;
    el.style.left=t.x+'px'; el.style.top=t.y+'px';
    el.style.width=t.w+'px'; el.style.height=t.h+'px';
    blockEl.appendChild(el);
    tileEls[blockIdx][i]=el;
    if (editMode) addEditHandles(el, i);

    const cap=makeCaptionEl(i, t);
    blockEl.appendChild(cap);
    captionEls[blockIdx][i]=cap;
  }
}

const BLOCKS=[];
function rebuildAllBlocks() {
  tileEls=[]; captionEls=[];
  for (let i=0; i<BLOCKS.length; i++) {
    BLOCKS[i].innerHTML='';
    buildBlock(BLOCKS[i], BLOCK_W, BLOCK_H, i);
  }
  // _initDone=true here so videos already have src — observe immediately
  document.querySelectorAll('.tile video').forEach(v => tileVideoObserver.observe(v));
}

/* ========================================================
   CAMERA
======================================================== */
let camX=0, camY=0, targetX=0, targetY=0;
let mouseNX=0, mouseNY=0;
let parallaxX=0, parallaxY=0;
let PARALLAX_AMPLITUDE=60, PARALLAX_EASE=.08, CAM_EASE=.11;
let dragging=false, lastX=0, lastY=0;

stage.addEventListener('pointerdown', e=>{
  if (window.innerWidth <= 768) { /* mobile — no edit */ }
  else if (editMode) {
    const tileEl=e.target.closest('.tile');
    if (tileEl) {
      const idx=parseInt(tileEl.dataset.tileIdx);
      if (isNaN(idx)) return;
      if (e.target.classList.contains('tile-handle-resize')) {
        activeTile={ idx, mode:'resize', startCX:e.clientX, startCY:e.clientY,
          origW:layout[idx].w, origH:layout[idx].h };
      } else if (e.target.classList.contains('tile-handle-delete')) {
        return;
      } else {
        if (e.shiftKey) {
          if (selectedSet.has(idx)) selectedSet.delete(idx); else selectedSet.add(idx);
          lastSelIdx=idx; updateSelectionVisuals(); showTileCtx(idx);
          stage.setPointerCapture(e.pointerId); return;
        }
        if (!selectedSet.has(idx)) { selectedSet.clear(); selectedSet.add(idx); updateSelectionVisuals(); }
        lastSelIdx=idx;
        const wp=screenToWorld(e.clientX,e.clientY);
        const origPositions=new Map(Array.from(selectedSet).map(i=>[i,{x:layout[i].x,y:layout[i].y}]));
        activeTile={ idx, mode:'drag', startWX:wp.x, startWY:wp.y,
          origX:layout[idx].x, origY:layout[idx].y, origPositions };
        showTileCtx(idx);
      }
      stage.setPointerCapture(e.pointerId);
      return;
    }
  }
  dragging=true; stage.classList.add('dragging');
  stage.setPointerCapture(e.pointerId); lastX=e.clientX; lastY=e.clientY;
});

stage.addEventListener('pointermove', e=>{
  mouseNX=(e.clientX/window.innerWidth)*2-1;
  mouseNY=(e.clientY/window.innerHeight)*2-1;
  if (activeTile) {
    const t=layout[activeTile.idx];
    if (activeTile.mode==='drag') {
      const wp=screenToWorld(e.clientX,e.clientY);
      let nx=activeTile.origX+(wp.x-activeTile.startWX);
      let ny=activeTile.origY+(wp.y-activeTile.startWY);
      nx=snapVal(nx,snapGrid); ny=snapVal(ny,snapGrid);
      const g=computeGuides(activeTile.idx,nx,ny,t.w,t.h);
      t.x=g.x; t.y=g.y; guideLines=g.lines;
      const dx=g.x-activeTile.origX, dy=g.y-activeTile.origY;
      for (const si of selectedSet) {
        if (si===activeTile.idx) continue;
        const orig=activeTile.origPositions?.get(si);
        if (orig) { layout[si].x=orig.x+dx; layout[si].y=orig.y+dy; updateTileDom(si); }
      }
    } else {
      const u=getU();
      let nw=activeTile.origW+(e.clientX-activeTile.startCX)/u;
      let nh=activeTile.origH+(e.clientY-activeTile.startCY)/u;
      nw=Math.max(80,snapVal(nw,snapGrid)); nh=Math.max(60,snapVal(nh,snapGrid));
      t.w=nw; t.h=nh; guideLines=[];
    }
    updateTileDom(activeTile.idx);
    return;
  }
  if (!dragging) return;
  const u=getU();
  targetX-=(e.clientX-lastX)/u; targetY-=(e.clientY-lastY)/u;
  lastX=e.clientX; lastY=e.clientY;
});

function endPointer(e) {
  if (activeTile) {
    activeTile=null; guideLines=[];
    recalcBlock(); // recalcBlock уже вызывает saveLayout()
    try { stage.releasePointerCapture(e.pointerId); } catch(_){}
    return;
  }
  if (!dragging) return;
  dragging=false; stage.classList.remove('dragging');
  try { stage.releasePointerCapture(e.pointerId); } catch(_){}
}

/* ========================================================
   GUIDES CANVAS
======================================================== */
const guidesCanvas=document.getElementById('guides-canvas');
const guidesCtx=guidesCanvas.getContext('2d');
function resizeGuidesCanvas() { guidesCanvas.width=window.innerWidth; guidesCanvas.height=window.innerHeight; }
window.addEventListener('resize', resizeGuidesCanvas); resizeGuidesCanvas();

function drawGuides() {
  guidesCtx.clearRect(0,0,guidesCanvas.width,guidesCanvas.height);

  // Block boundary indicator in edit mode
  if (editMode) {
    const u=getU(), vw=window.innerWidth, vh=window.innerHeight;
    const tx=(-camX-parallaxX)*u+vw/2, ty=(-camY-parallaxY)*u+vh/2;
    const baseBX=Math.round(camX/BLOCK_W)*BLOCK_W, baseBY=Math.round(camY/BLOCK_H)*BLOCK_H;
    guidesCtx.save();
    guidesCtx.strokeStyle='rgba(80,100,255,.35)';
    guidesCtx.lineWidth=1.5; guidesCtx.setLineDash([8,8]); guidesCtx.globalAlpha=1;
    for (let oy=-1;oy<=1;oy++) for (let ox=-1;ox<=1;ox++) {
      const sx=tx+(baseBX+ox*BLOCK_W-BLOCK_W/2)*u;
      const sy=ty+(baseBY+oy*BLOCK_H-BLOCK_H/2)*u;
      guidesCtx.strokeRect(sx, sy, BLOCK_W*u, BLOCK_H*u);
    }
    guidesCtx.restore();
  }

  if (!editMode||!activeTile||!guideLines.length) return;
  guidesCtx.save();
  guidesCtx.strokeStyle='rgba(255,80,160,.7)';
  guidesCtx.lineWidth=1; guidesCtx.setLineDash([5,5]); guidesCtx.globalAlpha=1;
  for (const g of guideLines) {
    if (g.type==='v') {
      const sx=worldToScreen(g.pos,0).x;
      guidesCtx.beginPath(); guidesCtx.moveTo(sx,0); guidesCtx.lineTo(sx,guidesCanvas.height); guidesCtx.stroke();
    } else {
      const sy=worldToScreen(0,g.pos).y;
      guidesCtx.beginPath(); guidesCtx.moveTo(0,sy); guidesCtx.lineTo(guidesCanvas.width,sy); guidesCtx.stroke();
    }
  }
  guidesCtx.restore();
}

/* ========================================================
   RENDER LOOP
======================================================== */
const emblemOverlay = document.getElementById('emblem-overlay');

function render() {
  const u=getU();
  parallaxX+=(mouseNX*PARALLAX_AMPLITUDE-parallaxX)*PARALLAX_EASE;
  parallaxY+=(mouseNY*PARALLAX_AMPLITUDE-parallaxY)*PARALLAX_EASE;
  camX+=(targetX-camX)*CAM_EASE; camY+=(targetY-camY)*CAM_EASE;
  const vw=window.innerWidth, vh=window.innerHeight;
  const tx=(-camX-parallaxX)*u+vw/2, ty=(-camY-parallaxY)*u+vh/2;
  world.style.transform=`translate3d(${tx}px,${ty}px,0) scale(${u})`;
  world.style.transformOrigin='0 0';
  const baseBX=Math.round(camX/BLOCK_W)*BLOCK_W, baseBY=Math.round(camY/BLOCK_H)*BLOCK_H;
  let i=0;
  for (let oy=-1;oy<=1;oy++) for (let ox=-1;ox<=1;ox++)
    BLOCKS[i++].style.transform=`translate3d(${baseBX+ox*BLOCK_W-BLOCK_W/2}px,${baseBY+oy*BLOCK_H-BLOCK_H/2}px,0)`;

  // Sync emblem overlay: read center block's (BLOCKS[4], ox=0 oy=0) .lockup-emblem rect.
  // BLOCKS[4] always holds the lockup nearest to screen center.
  // This runs after all transform writes, so one forced layout per frame — acceptable.
  if (emblemOverlay && BLOCKS[4]) {
    const anchor = BLOCKS[4].querySelector('.lockup-emblem');
    if (anchor) {
      const r = anchor.getBoundingClientRect();
      emblemOverlay.style.left   = r.left   + 'px';
      emblemOverlay.style.top    = r.top    + 'px';
      emblemOverlay.style.width  = r.width  + 'px';
      emblemOverlay.style.height = r.height + 'px';
    }
  }

  drawGuides();
  if (editMode && lastSelIdx>=0) positionTileCtx(lastSelIdx);
  requestAnimationFrame(render);
}

/* ========================================================
   INIT
======================================================== */
async function init() {
  const saved = loadLayoutRaw();

  if (saved) {
    // Restore layout from localStorage
    BLOCK_W = saved.block.w; BLOCK_H = saved.block.h;
    layout  = saved.tiles;

    // Restore tileNames / captionSizes arrays to match layout length
    while (tileNames.length < layout.length)    tileNames.push('Project ' + tileNames.length);
    while (tileCaptionSizes.length < layout.length) tileCaptionSizes.push(null);
    while (tileLinks.length < layout.length)    tileLinks.push(null);

    // Restore blob URLs from IndexedDB for uploaded media
    await Promise.all(layout.map(async (t, i) => {
      if (t.mediaKey) {
        try {
          const blob = await idbGet(t.mediaKey);
          if (blob) t.customSrc = URL.createObjectURL(blob);
        } catch(_) {}
      }
    }));

  } else {
    // First load — generate layout from dimensions
    const dims      = await Promise.all(PROJECTS.map(detectDims));
    const tileSizes = dims.map(d => dimsToTile(d.w, d.h));
    const centered  = generateLayoutCentered(tileSizes);
    const {w:bw, h:bh} = computeBlock(centered);
    BLOCK_W = bw; BLOCK_H = bh;
    layout  = toAbsLayout(centered, bw, bh);
    saveLayout();
  }

  for (let i=0; i<9; i++) {
    const b=document.createElement('div'); b.className='block';
    BLOCKS.push(b); world.appendChild(b);
    buildBlock(b, BLOCK_W, BLOCK_H, i);
  }
  const el=document.getElementById('dbg-block-val');
  if (el) el.textContent=`${BLOCK_W} × ${BLOCK_H}`;

  // Always start centered on lockup — hard reset before first render
  camX=0; camY=0; targetX=0; targetY=0; parallaxX=0; parallaxY=0;

  requestAnimationFrame(render);

  // 2 rAF: Frame1 = render positions world. Frame2 = IO sees correct positions.
  // Also: split videos into tier1 (in viewport) and tier2 (outside).
  //   Tier1: src set immediately, preloader waits for their loadeddata.
  //   Tier2: src deferred, IO lazy-loads when they approach viewport.
  requestAnimationFrame(() => requestAnimationFrame(() => {
    _initDone = true;
    const tier1 = [], tier2 = [];
    document.querySelectorAll('.tile video[data-src]').forEach(v => {
      const r = v.getBoundingClientRect();
      const inView = r.right > -150 && r.left < window.innerWidth  + 150 &&
                     r.bottom > -150 && r.top  < window.innerHeight + 150;
      (inView ? tier1 : tier2).push(v);
    });
    // Load tier1 — preloader is waiting for their first frames
    tier1.forEach(v => { v.preload='auto'; v.src=v.dataset.src; delete v.dataset.src; v.load(); });
    // Resolve so preloader can proceed
    _tier1ReadyResolve(tier1);
    // Tier2: IO handles lazy load
    tier2.forEach(v => tileVideoObserver.observe(v));
    // Tier1: also observed for play/pause control
    tier1.forEach(v => tileVideoObserver.observe(v));
  }));
}

// Promise resolves with tier1 video array after world is positioned.
let _tier1ReadyResolve;
const _tier1ReadyPromise = new Promise(r => { _tier1ReadyResolve = r; });

// IO: tier1 videos have src (play/pause). Tier2 videos have data-src (lazy load on approach).
const tileVideoObserver = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    const v = e.target;
    if (e.isIntersecting) {
      if (v.dataset.src) {
        // Tier2: first time in range — set src and load
        v.preload = 'auto'; v.src = v.dataset.src; delete v.dataset.src; v.load();
        v.addEventListener('loadeddata', () => v.play().catch(()=>{}), {once:true});
      } else {
        v.play().catch(()=>{});
      }
    } else {
      v.pause();
    }
  });
}, { rootMargin: '600px' });

init();

function buildExportData() {
  return {
    version: 2,
    exportedAt: new Date().toISOString(),
    settings: {...S},
    layout: layout.map(t=>({x:t.x,y:t.y,w:t.w,h:t.h,pi:t.pi,
      mediaKey:t.mediaKey||null, customType:t.customType||null})),
    blockSize: {w:BLOCK_W, h:BLOCK_H},
    tileNames: [...tileNames],
    tileLinks: [...tileLinks],
    captionSizes: [...tileCaptionSizes],
    captionGap, captionDefaultSize,
    blockPad: BLOCK_PAD,
    navLinks: {...navLinks},
    taglineText: localStorage.getItem('taglineText')||'',
    taglineAlign: localStorage.getItem('mm-tagline-align')||'left',
  };
}
function exportFullState() {
  const data = buildExportData();
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`maks-martin-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); a.remove();
}

function importFullState(jsonStr) {
  try {
    const data=JSON.parse(jsonStr);
    if (!data.layout||!data.blockSize) throw new Error('Нет layout или blockSize');
    if (data.settings) localStorage.setItem('dbg', JSON.stringify(Object.assign({},DEFAULTS,data.settings)));
    localStorage.setItem('layout', JSON.stringify(data.layout));
    localStorage.setItem('layoutBlock', JSON.stringify(data.blockSize));
    if (data.tileNames)    localStorage.setItem('tileNames', JSON.stringify(data.tileNames));
    if (data.tileLinks)    localStorage.setItem('tileLinks', JSON.stringify(data.tileLinks));
    if (data.captionSizes) localStorage.setItem('captionSizes', JSON.stringify(data.captionSizes));
    if (data.captionGap!=null)          localStorage.setItem('captionGap', data.captionGap);
    if (data.captionDefaultSize!=null)  localStorage.setItem('captionDefaultSize', data.captionDefaultSize);
    if (data.blockPad!=null)            localStorage.setItem('blockPad', data.blockPad);
    if (data.navLinks)     localStorage.setItem('navLinks', JSON.stringify(data.navLinks));
    if (data.taglineText)  localStorage.setItem('taglineText', data.taglineText);
    location.reload();
  } catch(e) { alert('Ошибка импорта: '+e.message); console.error('[import]',e); }
}

    const html = saved.replace(/\n/g,'<br/>');
    document.querySelectorAll('.lockup-tagline').forEach(el=>el.innerHTML=html);
  }
})();
// Also restore after blocks built — hook into init completion
const _origInit = init;
// tagline restore happens after INIT via MutationObserver on world
new MutationObserver(()=>{
  const saved=localStorage.getItem('taglineText'); if (!saved) return;
  const html=saved.replace(/\n/g,'<br/>');
  document.querySelectorAll('.lockup-tagline').forEach(el=>{ if(el.innerHTML!==html) el.innerHTML=html; });
}).observe(world,{childList:true,subtree:false});

// Hint in edit mode: show tagline as editable
world.addEventListener('pointerenter', e=>{
  if (!editMode) return;
  const tl=e.target.closest('.lockup-tagline');
  if (tl) tl.style.cursor='text';
},{capture:true});

/* ========================================================
   PRELOADER
======================================================== */
(function(){
  const prl     = document.getElementById('preloader');
  const counter = document.querySelector('.prl-counter');
  if (!prl || !counter) return;

  const START  = Date.now();
  const MIN_MS = 600;
  let hidden   = false;
  let display  = 0;
  let target   = 0;

  // ── rAF progress display ───────────────────────────────
  function tick() {
    if (hidden) return;
    display += (target - display) * 0.08;
    counter.textContent = Math.min(Math.floor(display), 100) + '%';
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  // ── Staggered tile delays from screen center ──────────
  function calculateTileDelays() {
    const tiles = document.querySelectorAll('.tile');
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2;
    const maxDist = Math.hypot(window.innerWidth, window.innerHeight) / 2;
    tiles.forEach(tile => {
      const r = tile.getBoundingClientRect();
      if (r.right < 0 || r.left > window.innerWidth ||
          r.bottom < 0 || r.top > window.innerHeight) {
        tile.style.transitionDelay = '0ms';
        return;
      }
      const tx = r.left + r.width / 2;
      const ty = r.top + r.height / 2;
      const distance = Math.hypot(tx - cx, ty - cy);
      const delay = 50 + (distance / maxDist) * 200;
      tile.style.transitionDelay = `${Math.round(delay)}ms`;
    });
  }

  // ── Orchestrated reveal ────────────────────────────────
  async function finishPreloader() {
    if (hidden) return;
    hidden = true;
    target = 100;
    counter.textContent = '100%';
    await new Promise(r => setTimeout(r, 200));
    calculateTileDelays();
    document.body.classList.add('reveal');
    document.body.classList.remove('loading');
    await new Promise(r => setTimeout(r, 100));
    prl.classList.add('hidden');
    setTimeout(() => { try { prl.remove(); } catch(_){} }, 800);
    setTimeout(() => {
      document.body.classList.add('reveal-done');
      document.querySelectorAll('.tile video').forEach(v => {
        if (v.readyState >= 2) v.play().catch(()=>{});
      });
    }, 2000);
  }

  // ── settle-once wrapper: resolves on load/error/timeout ─
  function waitFor(setupFn, ms) {
    return new Promise(resolve => {
      let done = false;
      const settle = () => { if (!done) { done = true; resolve(); } };
      try { setupFn(settle); } catch(_) { settle(); }
      setTimeout(settle, ms || 5000);
    });
  }

  // ── Wait for video first frame (readyState >= 2) ───────
  function waitForFirstFrame(v) {
    return waitFor(settle => {
      if (v.readyState >= 2) return settle();
      v.addEventListener('loadeddata', settle, {once:true});
      v.addEventListener('canplay',    settle, {once:true});
      v.addEventListener('error',      settle, {once:true});
    }, 5000);
  }

  // ── Main async preloader logic ─────────────────────────
  (async () => {
    // Wait for world to be positioned and tier1 videos to be identified.
    // Falls back to empty array after 3s if init is very slow.
    const tier1 = await Promise.race([
      _tier1ReadyPromise,
      new Promise(r => setTimeout(() => r([]), 3000)),
    ]);

    // Build task list
    const tasks = [];

    // 1. Fonts
    tasks.push(waitFor(s => document.fonts.ready.then(s, s), 3000));

    // 2. Tier1 video first frames (already loading — src set in 2-rAF block)
    for (const v of tier1) tasks.push(waitForFirstFrame(v));

    // 3. Static project images
    for (const p of PROJECTS) {
      if (p.type !== 'video') {
        tasks.push(waitFor(s => {
          const img = new Image();
          img.onload = s; img.onerror = s;
          img.src = p.src;
        }, 5000));
      }
    }

    const total = tasks.length || 1;
    let loaded = 0;

    // Wrap each task to update progress on settle
    const tracked = tasks.map(t => t.then(() => {
      loaded++;
      target = Math.round(loaded / total * 100);
    }));

    // Wait for all tasks or 8s hard cap
    await Promise.race([
      Promise.all(tracked),
      new Promise(r => setTimeout(r, 8000)),
    ]);

    // Enforce minimum display time
    const elapsed = Date.now() - START;
    if (elapsed < MIN_MS) await new Promise(r => setTimeout(r, MIN_MS - elapsed));

    await finishPreloader();

    // Play tier1 videos after reveal kicks off (IO may not re-fire)
    setTimeout(() => tier1.forEach(v => v.play().catch(()=>{})), 100);
  })();
})();
</script>
